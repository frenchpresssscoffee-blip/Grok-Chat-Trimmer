<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed Booster Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .container {
      max-width: 480px;
      width: 100%;
    }

    .brand {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.2), rgba(34, 211, 238, 0.1));
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 40px rgba(74, 222, 128, 0.2);
    }

    .brand h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #4ade80, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .brand p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 15px;
    }

    .setting {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .setting h2 {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .mode-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mode-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .mode-option:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .mode-option.active {
      background: rgba(74, 222, 128, 0.1);
      border-color: rgba(74, 222, 128, 0.3);
    }

    .mode-option input {
      width: 18px;
      height: 18px;
      accent-color: #4ade80;
    }

    .mode-info {
      flex: 1;
    }

    .mode-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .mode-desc {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
    }

    .toggle-setting {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toggle-label {
      font-weight: 500;
    }

    .toggle-hint {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }

    .switch {
      position: relative;
      width: 48px;
      height: 26px;
      cursor: pointer;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .switch-track {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 26px;
      transition: background 0.2s;
    }

    .switch-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .switch-track {
      background: #4ade80;
    }

    input:checked + .switch-track .switch-thumb {
      transform: translateX(22px);
    }

    .shortcuts {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 24px;
    }

    .shortcuts h2 {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .shortcut {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .shortcut:last-child {
      border-bottom: none;
    }

    kbd {
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
    }

    .shortcut-desc {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .saved {
      text-align: center;
      padding: 12px;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.2);
      border-radius: 12px;
      color: #4ade80;
      font-weight: 500;
      margin-top: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .saved.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <h1>Speed Booster</h1>
      <p>Zero-configuration performance for Grok</p>
    </div>

    <div class="setting">
      <h2>Optimization Mode</h2>
      <div class="mode-options">
        <label class="mode-option active" data-mode="auto">
          <input type="radio" name="mode" value="auto" checked>
          <div class="mode-info">
            <div class="mode-name">Auto (Recommended)</div>
            <div class="mode-desc">Balanced - keeps ~100 visible, 200 total (max)</div>
          </div>
        </label>
        <label class="mode-option" data-mode="aggressive">
          <input type="radio" name="mode" value="aggressive">
          <div class="mode-info">
            <div class="mode-name">Aggressive</div>
            <div class="mode-desc">Max speed - keeps ~50 visible, 100 total (max)</div>
          </div>
        </label>
        <label class="mode-option" data-mode="minimal">
          <input type="radio" name="mode" value="minimal">
          <div class="mode-info">
            <div class="mode-name">Minimal</div>
            <div class="mode-desc">Light virtualization - keeps ~150 visible, 200 total (max)</div>
          </div>
        </label>
        <label class="mode-option" data-mode="off">
          <input type="radio" name="mode" value="off">
          <div class="mode-info">
            <div class="mode-name">Off</div>
            <div class="mode-desc">Disable virtualization completely</div>
          </div>
        </label>
      </div>
    </div>

    <div class="shortcuts">
      <h2>Keyboard Shortcuts</h2>
      <div class="shortcut">
        <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>O</kbd>
        <span class="shortcut-desc">Force optimize now</span>
      </div>
      <div class="shortcut">
        <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>P</kbd>
        <span class="shortcut-desc">Pause / resume</span>
      </div>
      <div class="shortcut">
        <kbd>Click Badge</kbd>
        <span class="shortcut-desc">Pause / resume</span>
      </div>
    </div>

    <div class="saved" id="saved">Settings saved</div>
  </div>

  <script>
    // Load settings
    chrome.storage.sync.get(['mode'], (result) => {
      if (result.mode) {
        document.querySelector(`input[value="${result.mode}"]`).checked = true;
        updateActiveState(result.mode);
      }
    });

    // Mode selection
    document.querySelectorAll('input[name="mode"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        const mode = e.target.value;
        chrome.storage.sync.set({ mode });
        updateActiveState(mode);
        showSaved();
      });
    });

    function updateActiveState(mode) {
      document.querySelectorAll('.mode-option').forEach(option => {
        option.classList.toggle('active', option.dataset.mode === mode);
      });
    }

    function showSaved() {
      const saved = document.getElementById('saved');
      saved.classList.add('show');
      setTimeout(() => saved.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
